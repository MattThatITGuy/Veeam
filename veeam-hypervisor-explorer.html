<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veeam Hypervisor Feature Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #e2ddd4;
  --border2: #ccc6b8;
  --ink: #1a1814;
  --ink2: #4a4640;
  --ink3: #8a8278;
  --veeam: #00b336;
  --veeam-dark: #007d26;
  --veeam-light: rgba(0, 179, 54, 0.08);
  --veeam-mid: rgba(0, 179, 54, 0.18);
  --partial: #f59e0b;
  --partial-light: rgba(245, 158, 11, 0.1);
  --none: #e5e1d8;
  --accent: #c13d2a;
  --vmware: #607196;
  --hyperv: #0078d4;
  --nutanix: #024fa1;
  --proxmox: #e57000;
  --scalecomp: #6b35c7;
  --rhv: #cc0000;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--ink);
  color: white;
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.veeam-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 20px;
  letter-spacing: -0.5px;
}

.logo-v {
  width: 32px; height: 32px;
  background: var(--veeam);
  border-radius: 6px;
  display: grid;
  place-items: center;
  font-size: 16px;
  font-weight: 900;
  color: white;
}

.header-divider {
  width: 1px;
  height: 28px;
  background: rgba(255,255,255,0.15);
}

.header-subtitle {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.03em;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.6);
  transition: all 0.15s;
}

.filter-btn:hover, .filter-btn.active {
  background: white;
  color: var(--ink);
  border-color: white;
}

/* ── HYPERVISOR SELECTOR ── */
.hv-selector-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  position: sticky;
  top: 64px;
  z-index: 90;
}

.hv-selector-label {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 12px;
}

.hv-cards {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.hv-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-radius: 10px;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: all 0.18s;
  background: var(--bg);
  min-width: 0;
}

.hv-card:hover {
  border-color: var(--border2);
  transform: translateY(-1px);
}

.hv-card.selected {
  border-color: currentColor;
  background: white;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

.hv-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.hv-name {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
}

.hv-badge {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--ink3);
  white-space: nowrap;
}

/* ── MAIN LAYOUT ── */
.main {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: calc(100vh - 64px - 74px);
}

/* ── CATEGORY SIDEBAR ── */
.sidebar {
  border-right: 1px solid var(--border);
  background: var(--surface);
  padding: 20px 0;
  position: sticky;
  top: 138px;
  height: calc(100vh - 138px);
  overflow-y: auto;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.sidebar-section-label {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
  padding: 0 20px 8px;
  margin-top: 4px;
}

.cat-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 20px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink2);
  transition: all 0.12s;
  border-left: 3px solid transparent;
  gap: 8px;
}

.cat-item:hover {
  background: var(--bg);
  color: var(--ink);
}

.cat-item.active {
  background: var(--veeam-light);
  color: var(--veeam-dark);
  border-left-color: var(--veeam);
  font-weight: 600;
}

.cat-count {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--ink3);
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
}

.cat-item.active .cat-count {
  background: var(--veeam-mid);
  color: var(--veeam-dark);
}

/* ── CONTENT ── */
.content {
  padding: 28px 32px;
  overflow-y: auto;
}

/* ── SECTION HEADER ── */
.section-title {
  font-family: 'Fraunces', serif;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--ink);
  margin-bottom: 4px;
}

.section-meta {
  font-size: 13px;
  color: var(--ink3);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.meta-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
}

.meta-pill.green { color: var(--veeam-dark); border-color: var(--veeam-mid); background: var(--veeam-light); }
.meta-pill.amber { color: #92620a; border-color: rgba(245,158,11,0.3); background: var(--partial-light); }

/* ── FEATURE TABLE ── */
.feature-group {
  margin-bottom: 32px;
  animation: fadeUp 0.25s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.group-label {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
  padding: 0 0 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}

.feature-row {
  display: grid;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}

.feature-row:hover {
  background: var(--bg);
}

.feature-row.header-row {
  background: var(--surface2);
  position: sticky;
  top: 0;
  z-index: 5;
}

.feature-row.header-row:hover { background: var(--surface2); }

.cell {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  font-size: 13px;
}

.cell-feature {
  color: var(--ink2);
  line-height: 1.4;
  gap: 6px;
}

.cell-feature.new-feature .feat-name::before {
  content: 'NEW';
  font-size: 9px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  background: var(--accent);
  color: white;
  padding: 1px 5px;
  border-radius: 3px;
  margin-right: 6px;
  vertical-align: middle;
}

.feat-name {
  font-weight: 500;
  color: var(--ink);
}

.feat-desc {
  font-size: 11px;
  color: var(--ink3);
  margin-top: 2px;
  line-height: 1.5;
}

.cell-hv {
  justify-content: center;
  border-left: 1px solid var(--border);
}

.cell-hv-header {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  line-height: 1.3;
  border-left: 1px solid var(--border);
}

/* Support indicators */
.sup-full {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--veeam);
  display: grid;
  place-items: center;
  color: white;
  font-size: 12px;
  flex-shrink: 0;
}

.sup-partial {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--partial);
  display: grid;
  place-items: center;
  color: white;
  font-size: 12px;
  flex-shrink: 0;
}

.sup-none {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--none);
  display: grid;
  place-items: center;
  color: var(--ink3);
  font-size: 11px;
  flex-shrink: 0;
}

/* ── EMPTY STATE ── */
.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--ink3);
}

.empty-state-icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: 0.4;
}

/* ── LEGEND ── */
.legend {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 12px 32px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  font-size: 11px;
  color: var(--ink3);
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 80;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.legend-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
}

.no-hv-msg {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px;
  color: var(--ink3);
  font-size: 14px;
}

.hv-header-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}
</style>
</head>

<header>

  </div>
  <div class="header-right" id="filterBtns">

// ── STATE ────────────────────────────────────────────────────────────────────
let selectedHVs = new Set(['vsphere', 'hyperv', 'nutanix']);
let activeCategory = 'backup';
let activeFilter = 'all';

// ── RENDER HYPERVISOR CARDS ──────────────────────────────────────────────────
function renderHVCards() {
  const container = document.getElementById('hvCards');
  container.innerHTML = '';
  HYPERVISORS.forEach(hv => {
    const el = document.createElement('div');
    el.className = 'hv-card' + (selectedHVs.has(hv.id) ? ' selected' : '');
    el.style.color = hv.color;
    el.innerHTML = `
      <div class="hv-dot" style="background:${hv.color}"></div>
      <span class="hv-name" style="color:var(--ink)">${hv.short}</span>
      <span class="hv-badge">${hv.abbr}</span>
    `;
    el.addEventListener('click', () => {
      if (selectedHVs.has(hv.id)) {
        if (selectedHVs.size > 1) selectedHVs.delete(hv.id);
      } else {
        selectedHVs.add(hv.id);
      }
      renderHVCards();
      renderContent();
    });
    container.appendChild(el);
  });
}

// ── RENDER SIDEBAR ───────────────────────────────────────────────────────────
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = `<div class="sidebar-section-label">Categories</div>`;
  CATEGORIES.forEach(cat => {
    const features = getFilteredFeatures(cat);
    const el = document.createElement('div');
    el.className = 'cat-item' + (cat.id === activeCategory ? ' active' : '');
    el.innerHTML = `${cat.label}<span class="cat-count">${features.length}</span>`;
    el.addEventListener('click', () => {
      activeCategory = cat.id;
      renderSidebar();
      renderContent();
    });
    sb.appendChild(el);
  });
}

// ── FILTER FEATURES ──────────────────────────────────────────────────────────
function getFilteredFeatures(cat) {
  if (activeFilter === 'all') return cat.features;
  const hvArr = [...selectedHVs];
  return cat.features.filter(f => {
    const supValues = hvArr.map(hv => f.support[hv] || 'none');
    if (activeFilter === 'full')    return supValues.some(v => v === 'full');
    if (activeFilter === 'partial') return supValues.some(v => v === 'partial');
    if (activeFilter === 'none')    return supValues.some(v => v === 'none');
    return true;
  });
}

// ── RENDER CONTENT ───────────────────────────────────────────────────────────
function renderContent() {
  const content = document.getElementById('content');
  const cat = CATEGORIES.find(c => c.id === activeCategory);
  if (!cat) return;

  const hvArr = [...selectedHVs].map(id => HYPERVISORS.find(h => h.id === id));
  const features = getFilteredFeatures(cat);

  // Stats
  const allFeatures = cat.features;
  const fullySupported = allFeatures.filter(f => hvArr.every(hv => f.support[hv.id] === 'full')).length;
  const partiallySupported = allFeatures.filter(f => hvArr.some(hv => f.support[hv.id] === 'partial')).length;

  const colTemplate = `260px repeat(${hvArr.length}, 1fr)`;

  let html = `
    <div class="section-title">${cat.label}</div>
    <div class="section-meta">
      <span>${allFeatures.length} features in this category</span>
      <span class="meta-pill green">✓ ${fullySupported} all-platform</span>
      ${partiallySupported ? `<span class="meta-pill amber">◐ ${partiallySupported} partial</span>` : ''}
    </div>
  `;

  if (hvArr.length === 0) {
    html += `<div class="empty-state"><div class="empty-state-icon">☰</div><div>Select at least one hypervisor above to begin.</div></div>`;
    content.innerHTML = html;
    return;
  }

  if (features.length === 0) {
    html += `<div class="empty-state"><div class="empty-state-icon">◯</div><div>No features match the current filter.</div></div>`;
    content.innerHTML = html;
    return;
  }

  html += `<div class="feature-group">`;

  // Header row
  html += `<div class="feature-row header-row" style="grid-template-columns:${colTemplate}">`;
  html += `<div class="cell cell-feature" style="font-size:11px;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3)">Feature</div>`;
  hvArr.forEach(hv => {
    html += `<div class="cell cell-hv-header" style="color:${hv.color}">
      <div class="hv-header-dot" style="background:${hv.color}"></div>
      ${hv.short}
    </div>`;
  });
  html += `</div>`;

  // Feature rows
  features.forEach(feat => {
    html += `<div class="feature-row ${feat.isNew ? 'new-feature' : ''}" style="grid-template-columns:${colTemplate}">`;
    html += `<div class="cell cell-feature ${feat.isNew ? 'new-feature' : ''}">
      <div>
        <div class="feat-name">${feat.name}</div>
        <div class="feat-desc">${feat.desc}</div>
      </div>
    </div>`;
    hvArr.forEach(hv => {
      const sup = feat.support[hv.id] || 'none';
      let indicator = '';
      if (sup === 'full')    indicator = `<div class="sup-full">✓</div>`;
      if (sup === 'partial') indicator = `<div class="sup-partial">◐</div>`;
      if (sup === 'none')    indicator = `<div class="sup-none">—</div>`;
      html += `<div class="cell cell-hv">${indicator}</div>`;
    });
    html += `</div>`;
  });

  html += `</div>`;

  content.innerHTML = html;
}

// ── FILTER BUTTONS ───────────────────────────────────────────────────────────
document.getElementById('filterBtns').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  renderSidebar();
  renderContent();
});

// ── INIT ─────────────────────────────────────────────────────────────────────
renderHVCards();
renderSidebar();
renderContent();
</script>
